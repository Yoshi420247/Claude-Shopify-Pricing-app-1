name: Batch Price Analysis

on:
  workflow_dispatch:
    inputs:
      preset:
        description: 'Quick-start preset (overrides provider/search/fast/concurrency settings below)'
        required: true
        type: choice
        options:
          - custom
          - full-quality
          - quick-scan
          - budget
          - reanalyze-low-confidence
        default: 'custom'
      product_id:
        description: 'Shopify product ID(s) — numeric ID, admin URL, or handle. Comma-separate for multiple. Leave empty for all products.'
        required: false
        type: string
        default: ''
      vendor:
        description: 'Vendor/brand name to filter (leave empty for ALL vendors)'
        required: false
        type: string
        default: ''
      status:
        description: 'Product status filter'
        required: true
        type: choice
        options:
          - active
          - draft
          - all
        default: 'active'
      concurrency:
        description: 'Number of parallel workers (recommended: 50-200)'
        required: true
        type: string
        default: '100'
      provider:
        description: 'AI provider — "smart" uses cheapest model per step (recommended)'
        required: true
        type: choice
        options:
          - smart
          - openai
          - gemini
          - claude
        default: 'smart'
      search_mode:
        description: 'Search strategy for competitor research'
        required: true
        type: choice
        options:
          - gemini
          - openai
          - amazon
          - brave
          - none
        default: 'gemini'
      min_confidence:
        description: 'Minimum confidence to auto-apply prices (low = apply all, medium = skip low, high = only high)'
        required: true
        type: choice
        options:
          - low
          - medium
          - high
        default: 'low'
      max_price_change_pct:
        description: 'Max allowed price change % (0 = no limit). Flags changes exceeding this for review.'
        required: false
        type: string
        default: '0'
      limit:
        description: 'Max variants to process (0 = no limit)'
        required: false
        type: string
        default: '0'
      skip_analyzed:
        description: 'Skip already-analyzed products (only process new/unanalyzed)'
        required: true
        type: boolean
        default: false
      retry_failed:
        description: 'Auto-retry failed variants up to N times (0 = no retry)'
        required: false
        type: string
        default: '2'
      fast:
        description: 'Fast mode: uses gpt-4.1-nano + gemini-2.5-flash, skips reflection + deliberation.'
        required: true
        type: boolean
        default: false
      dry_run:
        description: 'Dry run (analyze only, do NOT apply prices to Shopify)'
        required: true
        type: boolean
        default: false
      markup:
        description: 'Simple cost markup multiplier (e.g. 3 = 3x cost). Skips AI — no API costs.'
        required: false
        type: string
        default: ''
      failed_report:
        description: 'Re-run failed products from report file (e.g. failed-products-2026-02-06-21-29-46.json)'
        required: false
        type: string
        default: ''

jobs:
  analyze:
    name: Run Batch Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hours max (should finish in ~30min with 100 workers)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply preset configuration
        id: config
        run: |
          PRESET="${{ inputs.preset }}"
          # Defaults from inputs
          PROVIDER="${{ inputs.provider }}"
          SEARCH="${{ inputs.search_mode }}"
          FAST="${{ inputs.fast }}"
          CONCURRENCY="${{ inputs.concurrency }}"
          MIN_CONFIDENCE="${{ inputs.min_confidence }}"
          RETRY="${{ inputs.retry_failed }}"

          if [ "$PRESET" = "full-quality" ]; then
            echo "Preset: FULL QUALITY — smart routing, gemini search, all steps, medium confidence"
            PROVIDER="smart"
            SEARCH="gemini"
            FAST="false"
            MIN_CONFIDENCE="medium"
            RETRY="2"
          elif [ "$PRESET" = "quick-scan" ]; then
            echo "Preset: QUICK SCAN — fast mode, skip deliberation, apply all"
            PROVIDER="smart"
            SEARCH="gemini"
            FAST="true"
            CONCURRENCY="150"
            MIN_CONFIDENCE="low"
            RETRY="1"
          elif [ "$PRESET" = "budget" ]; then
            echo "Preset: BUDGET — gemini only, fast mode, minimal API cost"
            PROVIDER="gemini"
            SEARCH="gemini"
            FAST="true"
            CONCURRENCY="80"
            MIN_CONFIDENCE="low"
            RETRY="1"
          elif [ "$PRESET" = "reanalyze-low-confidence" ]; then
            echo "Preset: REANALYZE LOW CONFIDENCE — full quality, only reprocess low-confidence results"
            PROVIDER="smart"
            SEARCH="gemini"
            FAST="false"
            MIN_CONFIDENCE="medium"
            RETRY="3"
          fi

          echo "provider=$PROVIDER" >> "$GITHUB_OUTPUT"
          echo "search=$SEARCH" >> "$GITHUB_OUTPUT"
          echo "fast=$FAST" >> "$GITHUB_OUTPUT"
          echo "concurrency=$CONCURRENCY" >> "$GITHUB_OUTPUT"
          echo "min_confidence=$MIN_CONFIDENCE" >> "$GITHUB_OUTPUT"
          echo "retry=$RETRY" >> "$GITHUB_OUTPUT"

      - name: Run batch analysis
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SHOPIFY_STORE_NAME: ${{ secrets.SHOPIFY_STORE_NAME }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          # Increase Node.js memory for high concurrency
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          PROVIDER="${{ steps.config.outputs.provider }}"
          SEARCH="${{ steps.config.outputs.search }}"
          FAST="${{ steps.config.outputs.fast }}"
          CONCURRENCY="${{ steps.config.outputs.concurrency }}"
          MIN_CONFIDENCE="${{ steps.config.outputs.min_confidence }}"
          RETRY="${{ steps.config.outputs.retry }}"

          # Build base args — "smart" provider means use default multi-provider routing (openai flag)
          if [ "$PROVIDER" = "smart" ]; then
            ARGS="--status ${{ inputs.status }} --concurrency $CONCURRENCY --search-mode $SEARCH --provider openai"
          else
            ARGS="--status ${{ inputs.status }} --concurrency $CONCURRENCY --search-mode $SEARCH --provider $PROVIDER"
          fi

          # Add confidence and retry flags
          ARGS="$ARGS --min-confidence $MIN_CONFIDENCE"

          if [ "$RETRY" != "0" ] && [ -n "$RETRY" ]; then
            ARGS="$ARGS --retry $RETRY"
          fi

          # Add max price change guard
          if [ "${{ inputs.max_price_change_pct }}" != "0" ] && [ -n "${{ inputs.max_price_change_pct }}" ]; then
            ARGS="$ARGS --max-price-change ${{ inputs.max_price_change_pct }}"
          fi

          if [ -n "${{ inputs.product_id }}" ]; then
            # Single/multi product mode: analyze specific product(s)
            ARGS="$ARGS --product-id \"${{ inputs.product_id }}\""
          elif [ -n "${{ inputs.failed_report }}" ]; then
            # Re-run mode: only process previously failed products
            ARGS="--failed-report ${{ inputs.failed_report }} --concurrency $CONCURRENCY --search-mode $SEARCH --provider $PROVIDER --min-confidence $MIN_CONFIDENCE"
            if [ "$RETRY" != "0" ] && [ -n "$RETRY" ]; then
              ARGS="$ARGS --retry $RETRY"
            fi
          else
            if [ -n "${{ inputs.vendor }}" ]; then
              ARGS="$ARGS --vendor \"${{ inputs.vendor }}\""
            fi

            if [ "${{ inputs.limit }}" != "0" ] && [ -n "${{ inputs.limit }}" ]; then
              ARGS="$ARGS --limit ${{ inputs.limit }}"
            fi
          fi

          if [ "${{ inputs.skip_analyzed }}" = "true" ]; then
            ARGS="$ARGS --skip-analyzed"
          fi

          if [ "$FAST" = "true" ]; then
            ARGS="$ARGS --fast"
          fi

          if [ -n "${{ inputs.markup }}" ]; then
            ARGS="$ARGS --markup ${{ inputs.markup }}"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          echo "Running: npx tsx --tsconfig tsconfig.scripts.json scripts/batch-analyze.ts $ARGS"
          eval npx tsx --tsconfig tsconfig.scripts.json scripts/batch-analyze.ts $ARGS

      - name: Upload failed products report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failed-products-report
          path: reports/failed-products-*.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload price changes report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-changes-report
          path: reports/price-changes-*.json
          if-no-files-found: ignore
          retention-days: 30
